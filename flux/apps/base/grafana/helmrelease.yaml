apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      version: ">=7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  values:
    persistence:
      enabled: true
      storageClassName: synology-iscsi
      size: 10Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.local
      paths:
        - /
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/"
      auth:
        disable_login_form: false
    service:
      type: ClusterIP
