apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 10m
  chart:
    spec:
      chart: vault
      version: ">=0.27.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
      interval: 1h
  values:
    server:
      dataStorage:
        enabled: true
        storageClass: synology-iscsi
        size: 10Gi
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - host: vault.local
            paths:
              - /
      standalone:
        enabled: true
        config: |
          ui = true
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "file" {
            path = "/vault/data"
          }
    ui:
      enabled: true
      serviceType: ClusterIP
    injector:
      enabled: false
