[defaults]
inventory          = inventory/hosts.yml
remote_user        = ubuntu
private_key_file   = ~/.ssh/id_ed25519
host_key_checking  = False
stdout_callback    = yaml
callbacks_enabled  = timer, profile_tasks
gathering          = smart
fact_caching       = memory
retry_files_enabled = False
pipelining         = True
forks              = 10

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
